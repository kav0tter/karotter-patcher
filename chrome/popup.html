<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>karotter://patcher</title>
  <style>
    :root {
      --void:         #05080a;
      --surface:      #0a0f0a;
      --surface-raised: #0d140d;
      --border:       #1a2a1a;
      --border-glow:  #00ff4122;
      --phosphor:     #00ff41;
      --phosphor-dim: #00cc3380;
      --phosphor-bg:  #00ff4108;
      --cyan:         #00e5ff;
      --cyan-dim:     #00e5ff60;
      --amber:        #ffb000;
      --amber-dim:    #ffb00040;
      --red:          #ff3333;
      --text:         #b0d0b0;
      --text-dim:     #4a6a4a;
      --mono:         'Consolas', 'Courier New', 'Monaco', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text);
      background: var(--void);
      width: 280px;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 255, 65, 0.015) 2px,
        rgba(0, 255, 65, 0.015) 4px
      );
      pointer-events: none;
      z-index: 1000;
    }

    /* CRT vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.5) 100%);
      pointer-events: none;
      z-index: 999;
    }

    /* Header */
    header {
      background: linear-gradient(180deg, #0d140d 0%, var(--void) 100%);
      border-bottom: 1px solid var(--border);
      padding: 10px 12px 8px;
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 2px;
      background: linear-gradient(90deg, transparent, var(--phosphor), transparent);
      animation: scanbar 3s ease-in-out infinite;
    }

    @keyframes scanbar {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }

    .header-prompt {
      font-size: 9px;
      color: var(--text-dim);
      margin-bottom: 4px;
      letter-spacing: 0.05em;
    }
    .header-prompt span { color: var(--cyan-dim); }

    .header-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--phosphor);
      text-shadow: 0 0 8px var(--phosphor-dim), 0 0 20px rgba(0,255,65,0.15);
      letter-spacing: 0.08em;
    }

    .header-sub {
      font-size: 9px;
      color: var(--text-dim);
      margin-top: 2px;
      letter-spacing: 0.03em;
    }
    .header-sub .ver { color: var(--cyan-dim); }

    /* Status bar */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      font-size: 9px;
      color: var(--text-dim);
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--phosphor);
      box-shadow: 0 0 4px var(--phosphor-dim);
      animation: blink-dot 2s ease-in-out infinite;
    }
    .status-dot.off {
      background: var(--red);
      box-shadow: 0 0 4px rgba(255,51,51,0.4);
      animation: none;
    }

    @keyframes blink-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-text { letter-spacing: 0.04em; }
    .status-text .highlight { color: var(--phosphor); }

    /* Main */
    main { padding: 8px 0; }

    /* Section */
    .section { border-bottom: 1px solid var(--border); }
    .section:last-child { border-bottom: none; }

    .section-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      font-size: 9px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .section-header::before {
      content: '//';
      color: var(--phosphor-dim);
      font-weight: 700;
    }

    /* Toggle row */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 12px;
      cursor: pointer;
      user-select: none;
      transition: background 0.1s;
    }
    .toggle-row:hover { background: var(--phosphor-bg); }

    .toggle-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toggle-flag {
      font-size: 10px;
      color: var(--phosphor);
      font-weight: 600;
      min-width: 18px;
      opacity: 0.7;
    }

    .toggle-label {
      font-size: 11px;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    .toggle-input { display: none; }

    .toggle-switch {
      position: relative;
      width: 32px; height: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .toggle-switch::before {
      content: '';
      position: absolute;
      top: 2px; left: 2px;
      width: 10px; height: 10px;
      background: var(--text-dim);
      border-radius: 1px;
      transition: all 0.2s;
    }
    .toggle-input:checked + .toggle-switch {
      background: var(--phosphor-bg);
      border-color: var(--phosphor-dim);
      box-shadow: 0 0 6px rgba(0,255,65,0.1);
    }
    .toggle-input:checked + .toggle-switch::before {
      transform: translateX(16px);
      background: var(--phosphor);
      box-shadow: 0 0 4px var(--phosphor-dim);
    }

    /* Badge chips */
    .badge-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 4px 12px 8px;
    }
    .badge-chip {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border: 1px solid var(--border);
      border-radius: 2px;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      user-select: none;
      transition: all 0.15s;
    }
    .badge-chip:hover { border-color: var(--phosphor-dim); }
    .badge-chip input { display: none; }
    .badge-chip .badge-icon {
      position: relative;
      width: 14px; height: 14px;
      flex-shrink: 0;
      opacity: 0.3;
      transition: opacity 0.15s;
    }
    .badge-chip .badge-icon .bg-svg { position: absolute; inset: 0; width: 100%; height: 100%; fill: currentColor; }
    .badge-chip .badge-icon .check-svg { position: absolute; inset: 0; width: 62%; height: 62%; margin: auto; }
    .badge-chip input:checked ~ .badge-icon { opacity: 1; }
    .badge-chip input:checked ~ .chip-label { color: var(--phosphor); }
    .badge-chip[data-color="YELLOW"] .badge-icon { color: #f8c500; }
    .badge-chip[data-color="PURPLE"] .badge-icon { color: #8b5cf6; }
    .badge-chip[data-color="BLUE"]   .badge-icon { color: #1d9bf0; }
    .badge-chip[data-color="GRAY"]   .badge-icon { color: #9ca3af; }
    .badge-chip[data-color="BLACK"]  .badge-icon { color: #111827; }
    .badge-chip[data-color="RED"]    .badge-icon { color: #ef4444; }
    .badge-chip[data-color="GREEN"]  .badge-icon { color: #22c55e; }
    .badge-chip[data-color="ORANGE"] .badge-icon { color: #ff7a00; }

    /* Master toggle */
    .master-row {
      padding: 8px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .master-row .toggle-row { padding: 0; }
    .master-row .toggle-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--phosphor);
      text-shadow: 0 0 6px var(--phosphor-dim);
    }
    .master-row .toggle-switch { width: 36px; height: 18px; }
    .master-row .toggle-switch::before { width: 12px; height: 12px; }
    .master-row .toggle-input:checked + .toggle-switch::before {
      transform: translateX(18px);
    }

    /* Console log */
    .console {
      padding: 6px 12px;
      font-size: 9px;
      color: var(--text-dim);
      max-height: 60px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .console-line {
      display: flex;
      gap: 4px;
      line-height: 1.6;
    }
    .console-ts { color: var(--text-dim); opacity: 0.5; }
    .console-ok { color: var(--phosphor); }
    .console-warn { color: var(--amber); }
    .console-err { color: var(--red); }

    /* Footer */
    footer {
      padding: 6px 12px;
      font-size: 8px;
      color: var(--text-dim);
      opacity: 0.4;
      text-align: center;
      letter-spacing: 0.08em;
      border-top: 1px solid var(--border);
    }

    /* Disabled state */
    body.disabled .section .toggle-label,
    body.disabled .section .select-row .select-flag,
    body.disabled .section .toggle-flag {
      opacity: 0.3;
    }
    body.disabled .section .toggle-row,
    body.disabled .section .select-row {
      pointer-events: none;
    }
  </style>
